name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run retrieval-layer tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

     
      - name: Run fast smoke tests
        run: PYTHONPATH=. pytest tests/ -v -m "not slow"

      
      - name: Run retrieval quality gate
        run: PYTHONPATH=. pytest tests/ -v -m "slow"
         

  docker-build:
    name: Build Docker image
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t healthcare-chatbot-rag:ci .

      - name: Confirm image was built
        run: docker images | grep healthcare-chatbot-rag
