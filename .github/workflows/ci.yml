name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run retrieval-layer tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      # Fast tests only by default: file integrity + module imports.
      # This keeps CI quick and reliable on every push.
      - name: Run fast smoke tests
        run: PYTHONPATH=. pytest tests/ -v -m "not slow"

      # The retrieval quality gate (embeddings + FAISS) — downloads a small
      # (~80MB) sentence-transformer model, so it's slower but still practical.
      # Runs separately so a failure here is easy to distinguish from a basic
      # file/import problem.
      - name: Run retrieval quality gate
        run: PYTHONPATH=. pytest tests/ -v -m "slow"
        continue-on-error: true  # remove this line once the test is confirmed stable

  docker-build:
    name: Build Docker image
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t healthcare-chatbot-rag:ci .

      - name: Confirm image was built
        run: docker images | grep healthcare-chatbot-rag
